apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-demo-app
  labels:
    app: python-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-demo-app
  template:
    metadata:
      labels:
        app: python-demo-app
    spec:
      containers:
      - name: python-demo-app
        image: jithendra2107/python-demo-app:v1
        volumeMounts:
          - name: db-connection
            mountPath: /opt
        ports:
        - containerPort: 8000
      volumes:
        - name: db-connection
          configMap:
            name: test-demo
